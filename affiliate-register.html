<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar - Kanasari Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Cormorant:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css?v=desktop-plus10a" />
  <style>
    body { margin: 0; padding: 0; overflow-x: hidden; }
    .split-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh; min-height: 100dvh;
    }
    .split-image {
      background: url('https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?ixlib=rb-4.0.3&auto=format&fit=crop&w=2070&q=80') center/cover no-repeat;
      position: relative;
    }
    .split-image::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6), transparent);
    }
    .split-image-text {
      position: absolute;
      bottom: 60px;
      left: 60px;
      right: 60px;
      color: white;
      z-index: 2;
    }
    .split-image-text h2 {
      font-size: 3rem;
      font-family: var(--font-heading);
      margin-bottom: 16px;
      line-height: 1.1;
    }
    .split-image-text p {
      font-size: 1.25rem;
      opacity: 0.9;
    }
    .split-form {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 3.75rem 5rem;
      background: var(--white);
    }
    .auth-logo { height: 100px; margin-bottom: 40px; }
    .auth-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 12px; color: var(--neutral-800); }
    .auth-desc { font-size: 1.25rem; color: var(--neutral-500); margin-bottom: 48px; }
    
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { margin-bottom: 24px; }
    .form-label { display: block; font-size: 1.125rem; font-weight: 600; margin-bottom: 10px; color: var(--neutral-700); }
    .form-input { 
      width: 100%; 
      padding: 16px 20px; 
      border: 1.5px solid var(--neutral-200); 
      border-radius: var(--r-md); 
      font-family: var(--font); 
      font-size: 1.125rem; 
      outline: none; 
      transition: border-color 0.2s; 
    }
    .form-input:focus { border-color: var(--primary); }
    
    .auth-btn { 
      width: 100%; 
      padding: 18px; 
      font-size: 1.25rem; 
      border-radius: var(--r-full); 
      background: var(--primary); 
      color: var(--white); 
      font-weight: 600; 
      cursor: pointer; 
      border: none; 
      font-family: var(--font); 
      letter-spacing: 1px; 
      transition: 0.2s; 
      margin-top: 12px;
    }
    .auth-btn:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: var(--shadow-md); }
    
    .auth-links { margin-top: 32px; font-size: 1.125rem; color: var(--neutral-500); text-align: center; }
    .auth-links a { color: var(--primary); font-weight: 600; text-decoration: underline; text-underline-offset: 4px; }

    /* Responsive */
    @media (max-width: 1024px) {
      .split-form { padding: 40px 60px; }
      .form-row { grid-template-columns: 1fr; gap: 0; }
    }
        @media (max-width: 768px) {
      body { grid-template-columns: 1fr; }
      .split-layout { grid-template-columns: 1fr; min-height: 100svh; }
      .split-image { display: none; }
      .split-form { width: 100%; max-width: 100%; min-height: 100svh; box-sizing: border-box; padding: clamp(1.25rem, 6vw, 2rem) clamp(0.875rem, 5vw, 2rem); }
    }
  </style>
</head>
<body>
  <div class="split-layout">
    <div class="split-image">
      <div class="split-image-text">
        <h2>Mulai Perjalanan Anda</h2>
        <p>Daftarkan akun dan nikmati pengalaman berbelanja terbaik, atau jadilah bagian dari afiliator sukses kami.</p>
      </div>
    </div>
    <div class="split-form">
      <a href="index.html" style="display: inline-flex; align-items: center; gap: 8px; color: var(--neutral-500); text-decoration: none; font-size: 1rem; font-weight: 500; margin-bottom: 32px; transition: color 0.2s;" onmouseover="this.style.color='var(--primary)'" onmouseout="this.style.color='var(--neutral-500)'">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Kembali ke Beranda
      </a>
      <a href="index.html"><img src="assets/img/logo.png" alt="Kanasari" class="auth-logo" /></a>
      <h1 class="auth-title">Daftar Program Afiliasi</h1>
      <p class="auth-desc">Isi data diri Anda untuk bergabung sebagai mitra afiliasi kami.</p>
      
      <form id="registerForm">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">Nama Depan</label>
            <input type="text" class="form-input" id="regFirstName" placeholder="Nama" required />
          </div>
          <div class="form-group">
            <label class="form-label">Nama Belakang</label>
            <input type="text" class="form-input" id="regLastName" placeholder="Belakang" />
          </div>
        </div>
        
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="regEmail" placeholder="nama@email.com" required />
        </div>
        
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="regPassword" placeholder="Buat password baru" required />
        </div>

        <button type="submit" class="auth-btn">DAFTAR SEKARANG</button>
      </form>
      
      <div class="auth-links">
        Sudah punya akun? <a href="affiliate-login.html">Masuk di sini</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const firstName = document.getElementById('regFirstName').value;
      const email = document.getElementById('regEmail').value;
      
      // Simulasi Registrasi Afiliasi
      localStorage.setItem('kanasari_login_at', String(Date.now()));
      localStorage.setItem('kanasari_user', JSON.stringify({
        name: firstName,
        email: email,
        role: 'affiliate'
      }));
      
      window.location.href = 'affiliate/index.html';
    });
  </script>

<a class="whatsapp-float" href="https://wa.me/6281234567890?text=Halo%20Kanasari%20Store%2C%20saya%20ingin%20bertanya%20tentang%20produk." target="_blank" rel="noopener" aria-label="Hubungi Kanasari Store via WhatsApp">

  </svg>
</a>
</body>
</html>
